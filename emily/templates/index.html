<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grade Observability Rig</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      header {
        background: #1d4ed8;
        color: #ffffff;
        padding: 28px clamp(18px, 4vw, 48px);
      }

      header h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.7rem);
        letter-spacing: 0;
      }

      header p {
        margin: 0;
        max-width: 820px;
        color: #dbeafe;
        line-height: 1.5;
      }

      main {
        display: grid;
        gap: 24px;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        padding: 28px clamp(18px, 4vw, 48px);
      }

      section {
        background: #ffffff;
        border: 1px solid #d7deea;
        border-radius: 8px;
        padding: 22px;
        box-shadow: 0 10px 30px rgba(29, 78, 216, 0.08);
      }

      h2 {
        margin: 0 0 18px;
        font-size: 1.25rem;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #334155;
        font-weight: 650;
      }

      input {
        width: 100%;
        border: 1px solid #b9c4d6;
        border-radius: 6px;
        color: #172033;
        font: inherit;
        padding: 11px 12px;
      }

      input:focus {
        border-color: #1d4ed8;
        outline: 3px solid rgba(29, 78, 216, 0.14);
      }

      button {
        align-items: center;
        background: #0f766e;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        display: inline-flex;
        font: inherit;
        font-weight: 750;
        justify-content: center;
        min-height: 44px;
        padding: 10px 16px;
      }

      button:hover {
        background: #115e59;
      }

      .status {
        border-radius: 6px;
        display: none;
        font-weight: 650;
        margin-top: 14px;
        padding: 11px 12px;
      }

      .status.is-visible {
        display: block;
      }

      .status.success {
        background: #dcfce7;
        color: #166534;
      }

      .status.error {
        background: #fee2e2;
        color: #991b1b;
      }

      .results {
        margin-top: 18px;
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid #e2e8f0;
        padding: 10px 8px;
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: #475569;
        font-size: 0.86rem;
        text-transform: uppercase;
      }

      .empty-state {
        color: #64748b;
        margin: 0;
        padding: 12px 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Grade Observability Rig</h1>
      <p>Submit and retrieve student grades while emitting traceable API and database logs for observability platform testing.</p>
    </header>

    <main>
      <section aria-labelledby="submit-heading">
        <h2 id="submit-heading">Submit Grade</h2>
        <form id="submit-grade-form">
          <label>
            First Name
            <input id="submit-first-name" name="first_name" autocomplete="given-name" required>
          </label>
          <label>
            Last Name
            <input id="submit-last-name" name="last_name" autocomplete="family-name" required>
          </label>
          <label>
            Class
            <input id="submit-class-name" name="class_name" required>
          </label>
          <label>
            Grade
            <input id="submit-grade" name="grade" required>
          </label>
          <button type="submit">Submit Grade</button>
        </form>
        <div id="submit-status" class="status" role="status" aria-live="polite"></div>
      </section>

      <section aria-labelledby="view-heading">
        <h2 id="view-heading">View Grades</h2>
        <form id="view-grades-form">
          <label>
            First Name
            <input id="view-first-name" name="first_name" autocomplete="given-name" required>
          </label>
          <label>
            Last Name
            <input id="view-last-name" name="last_name" autocomplete="family-name" required>
          </label>
          <button type="submit">View Grades</button>
        </form>
        <div id="view-status" class="status" role="status" aria-live="polite"></div>
        <div id="grades-results" class="results" aria-live="polite">
          <p class="empty-state">Search for a student to display grade records.</p>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
